<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-box">
        <h1>Weather App</h1>

        <div class="call-btn">
            <button id="btn" onclick="toggleSearch()">🔍</button>
        </div>
        <div class="search">
            <form class="search-box" onsubmit="getWeather(event)">
                <input type="text" id="city" placeholder="Enter City Name" required>
                <button type="submit">🔍</button>
            </form>
        </div>

        <div id="result"></div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
